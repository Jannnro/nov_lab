<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,700;0,800;1,900&family=Montserrat:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 28px 32px; width: 700px; }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .label { font-family: 'Montserrat'; font-size: 10px; color: rgba(253,253,253,0.3); text-transform: uppercase; letter-spacing: 0.1em; width: 80px; flex-shrink: 0; }
  .bar { height: 4px; border-radius: 2px; background: rgba(255,28,247,0.2); flex: 1; position: relative; overflow: visible; }
  .bar-fill { height: 100%; border-radius: 2px; background: #FF1CF7; }
  .val { font-family: 'Montserrat'; font-size: 10px; color: rgba(253,253,253,0.4); width: 40px; text-align: right; }
</style>
</head>
<body>
  <div style="display:flex;gap:40px;align-items:flex-start;">
    <!-- Scale table -->
    <div style="flex:1;">
      <div class="row"><div class="label">--1</div><div class="bar"><div class="bar-fill" style="width:3%"></div></div><div class="val">4px</div></div>
      <div class="row"><div class="label">--2</div><div class="bar"><div class="bar-fill" style="width:6%"></div></div><div class="val">8px</div></div>
      <div class="row"><div class="label">--3</div><div class="bar"><div class="bar-fill" style="width:9%"></div></div><div class="val">12px</div></div>
      <div class="row"><div class="label">--4</div><div class="bar"><div class="bar-fill" style="width:12%"></div></div><div class="val">16px</div></div>
      <div class="row"><div class="label">--5</div><div class="bar"><div class="bar-fill" style="width:18%"></div></div><div class="val">24px</div></div>
      <div class="row"><div class="label">--6</div><div class="bar"><div class="bar-fill" style="width:25%"></div></div><div class="val">32px</div></div>
      <div class="row"><div class="label">--7</div><div class="bar"><div class="bar-fill" style="width:37%"></div></div><div class="val">48px</div></div>
      <div class="row"><div class="label">--8</div><div class="bar"><div class="bar-fill" style="width:50%"></div></div><div class="val">64px</div></div>
      <div class="row"><div class="label">--9</div><div class="bar"><div class="bar-fill" style="width:75%"></div></div><div class="val">96px</div></div>
      <div class="row"><div class="label">--10</div><div class="bar"><div class="bar-fill" style="width:100%"></div></div><div class="val">128px</div></div>
    </div>
    <!-- Radii -->
    <div style="display:flex;flex-direction:column;gap:10px;padding-top:4px;">
      <div style="font-family:'Montserrat';font-size:10px;color:rgba(253,253,253,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">Radii</div>
      <div style="display:flex;gap:8px;align-items:flex-end;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:24px;height:24px;background:#2A0A4A;border:1.5px solid rgba(255,28,247,0.4);border-radius:8px;"></div>
          <span style="font-family:'Montserrat';font-size:9px;color:rgba(253,253,253,0.3);">8</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:32px;height:32px;background:#2A0A4A;border:1.5px solid rgba(255,28,247,0.4);border-radius:16px;"></div>
          <span style="font-family:'Montserrat';font-size:9px;color:rgba(253,253,253,0.3);">16</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:48px;height:48px;background:#2A0A4A;border:1.5px solid rgba(255,28,247,0.4);border-radius:32px;"></div>
          <span style="font-family:'Montserrat';font-size:9px;color:rgba(253,253,253,0.3);">32</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:60px;height:60px;background:#2A0A4A;border:1.5px solid rgba(255,28,247,0.4);border-radius:63px;"></div>
          <span style="font-family:'Montserrat';font-size:9px;color:rgba(253,253,253,0.3);">63</span>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
          <div style="width:32px;height:32px;background:#2A0A4A;border:1.5px solid rgba(255,28,247,0.4);border-radius:9999px;"></div>
          <span style="font-family:'Montserrat';font-size:9px;color:rgba(253,253,253,0.3);">full</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
