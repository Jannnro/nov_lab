<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,400;0,700;0,800;1,900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 32px; width: 700px; }
</style>
</head>
<body>
  <!-- Logo dark -->
  <div style="display:flex;gap:60px;align-items:center;flex-wrap:wrap;">
    <div>
      <div style="background:#0F041A;padding:24px 32px;border-radius:16px;display:inline-block;border:1px solid rgba(255,28,247,0.15);">
        <div style="display:flex;align-items:baseline;gap:0;">
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:900;font-style:italic;color:#FDFDFD;line-height:1;">NOV</span>
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:100;color:#FDFDFD;line-height:1;">Lab</span>
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:100;color:#FF1CF7;line-height:1;">.</span>
        </div>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-size:10px;color:rgba(253,253,253,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-top:10px;">Dark variant</div>
    </div>

    <div>
      <div style="background:#FDFDFD;padding:24px 32px;border-radius:16px;display:inline-block;">
        <div style="display:flex;align-items:baseline;gap:0;">
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:900;font-style:italic;color:#0F041A;line-height:1;">NOV</span>
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:100;color:#0F041A;line-height:1;">Lab</span>
          <span style="font-family:'Poppins',sans-serif;font-size:56px;font-weight:100;color:#FF1CF7;line-height:1;">.</span>
        </div>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-size:10px;color:rgba(253,253,253,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-top:10px;">Light variant</div>
    </div>
  </div>
</body>
</html>
