<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 28px 32px; width: 700px; }
  .row { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid rgba(255,28,247,0.1); padding: 12px 0; }
  .meta { font-family: 'Montserrat', sans-serif; font-size: 10px; color: rgba(253,253,253,0.3); width: 160px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Montserrat 600<br>Labels / UI</div>
    <span style="font-family:'Montserrat';font-size:22px;font-weight:600;color:#FDFDFD;letter-spacing:0.04em;">PALETA DE CORES</span>
  </div>
  <div class="row">
    <div class="meta">Montserrat 400<br>Body Secondary</div>
    <span style="font-family:'Montserrat';font-size:16px;font-weight:400;color:rgba(253,253,253,0.65);">Identidade visual, design e estratégia</span>
  </div>
  <div class="row">
    <div class="meta">Space Mono 400<br>Mono / Accent</div>
    <span style="font-family:'Space Mono';font-size:22px;font-weight:400;color:#FF1CF7;letter-spacing:0.02em;">Space mono</span>
  </div>
  <div class="row">
    <div class="meta">Space Mono<br>Code / Data</div>
    <span style="font-family:'Space Mono';font-size:14px;font-weight:400;color:rgba(255,28,247,0.7);">#FF1CF7 · #0F041A · #2A0A4A</span>
  </div>
</body>
</html>
