<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,500;0,700;0,800;1,900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 28px 32px; width: 700px; display: flex; gap: 20px; }
</style>
</head>
<body>
  <!-- Service card -->
  <div style="background:#2A0A4A;border-radius:32px;padding:28px;width:200px;border:2px solid rgba(255,28,247,0.2);">
    <div style="width:44px;height:44px;border-radius:12px;background:rgba(255,28,247,0.15);border:1.5px solid #FF1CF7;margin-bottom:16px;display:flex;align-items:center;justify-content:center;">
      <div style="width:20px;height:2px;background:#FF1CF7;border-radius:1px;"></div>
    </div>
    <div style="font-family:'Poppins';font-size:16px;font-weight:700;color:#FDFDFD;margin-bottom:8px;">Reels & Vídeo</div>
    <div style="font-family:'Poppins';font-size:12px;font-weight:300;color:rgba(253,253,253,0.55);line-height:1.5;">Edição com intenção e impacto visual.</div>
  </div>

  <!-- Highlighted card -->
  <div style="background:#FF1CF7;border-radius:32px;padding:28px;width:200px;">
    <div style="font-family:'Montserrat';font-size:10px;font-weight:600;color:rgba(15,4,26,0.6);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">Em destaque</div>
    <div style="font-family:'Poppins';font-size:20px;font-weight:800;color:#0F041A;margin-bottom:8px;line-height:1.1;">Landing Pages</div>
    <div style="font-family:'Poppins';font-size:12px;font-weight:400;color:rgba(15,4,26,0.65);line-height:1.5;">Que convertem visitantes em clientes.</div>
  </div>

  <!-- Outline card -->
  <div style="border-radius:32px;padding:28px;width:200px;border:2px solid #FF1CF7;position:relative;">
    <div style="font-family:'Montserrat';font-size:10px;font-weight:600;color:rgba(253,253,253,0.35);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">Social Media</div>
    <div style="font-family:'Poppins';font-size:18px;font-weight:700;color:#FDFDFD;margin-bottom:8px;line-height:1.1;">Conteúdo que para o scroll</div>
    <div style="font-family:'Poppins';font-size:12px;font-weight:300;color:rgba(253,253,253,0.5);line-height:1.5;">Carrosséis, stories e posts estáticos.</div>
  </div>
</body>
</html>
