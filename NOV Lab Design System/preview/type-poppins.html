<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,400;0,500;0,700;0,800;1,900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 28px 32px; width: 700px; }
  .row { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid rgba(255,28,247,0.1); padding: 10px 0; }
  .meta { font-family: 'Montserrat', sans-serif; font-size: 10px; color: rgba(253,253,253,0.3); width: 160px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row" style="border-bottom:none;padding-bottom:4px;">
    <div class="meta">Poppins 900 Italic<br>Hero / Display</div>
    <span style="font-family:'Poppins';font-size:48px;font-weight:900;font-style:italic;color:#FDFDFD;line-height:1;">Estética.</span>
  </div>
  <div class="row">
    <div class="meta">Poppins 800<br>Title</div>
    <span style="font-family:'Poppins';font-size:36px;font-weight:800;color:#FDFDFD;line-height:1;">Toda transformação</span>
  </div>
  <div class="row">
    <div class="meta">Poppins 500<br>Subtitle</div>
    <span style="font-family:'Poppins';font-size:24px;font-weight:500;color:#FDFDFD;line-height:1;">começa com uma faísca</span>
  </div>
  <div class="row">
    <div class="meta">Poppins 300<br>Body</div>
    <span style="font-family:'Poppins';font-size:16px;font-weight:300;color:rgba(253,253,253,0.6);line-height:1.5;">Especializada em transformar ideias em conteúdo que funciona.</span>
  </div>
  <div class="row">
    <div class="meta">Poppins 100<br>Thin / Logo</div>
    <span style="font-family:'Poppins';font-size:32px;font-weight:100;color:#FDFDFD;line-height:1;">Lab.</span>
  </div>
</body>
</html>
