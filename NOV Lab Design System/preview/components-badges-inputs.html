<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,700;0,800;1,900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F041A; padding: 28px 32px; width: 700px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .badge { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 9999px; padding: 5px 14px; display: inline-block; }
  .input-wrap { width: 100%; margin-top: 8px; display: flex; gap: 12px; }
  .input { background: #2A0A4A; border: 2px solid rgba(255,28,247,0.25); border-radius: 12px; padding: 12px 16px; font-family: 'Poppins'; font-size: 14px; font-weight: 300; color: #FDFDFD; width: 240px; outline: none; }
  .input:focus { border-color: #FF1CF7; }
  .input::placeholder { color: rgba(253,253,253,0.3); }
</style>
</head>
<body>
  <span class="badge" style="background:#FF1CF7;color:#0F041A;">Novo</span>
  <span class="badge" style="background:#2A0A4A;color:#FF1CF7;border:1.5px solid #FF1CF7;">Destaque</span>
  <span class="badge" style="background:transparent;color:rgba(253,253,253,0.55);border:1.5px solid rgba(253,253,253,0.2);">Social Media</span>
  <span class="badge" style="background:rgba(255,28,247,0.12);color:#FF1CF7;">Tráfego Pago</span>
  <span class="badge" style="background:#0F041A;color:rgba(253,253,253,0.4);border:1px solid rgba(255,255,255,0.1);">Branding</span>

  <div class="input-wrap">
    <input class="input" placeholder="Seu nome ou empresa...">
    <input class="input" placeholder="Focused state" style="border-color:#FF1CF7;">
  </div>
</body>
</html>
